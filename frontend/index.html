<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💰</text></svg>" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- index.html itself must NOT cache, otherwise users keep loading old hashed bundles
       after a deploy and need a hard-refresh. The hashed JS/CSS files are content-addressed
       so they're already safe to cache for a long time. -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https: http://localhost:8000 https://*.railway.app https://*.facebook.com https://*.fbcdn.net https://*.r2.dev; media-src 'self' data: blob: https: http://localhost:8000 https://*.railway.app https://*.facebook.com https://*.fbcdn.net https://*.r2.dev; worker-src 'self' blob:; connect-src 'self' blob: https://generativelanguage.googleapis.com https://graph.facebook.com http://localhost:8000 https://*.railway.app https://*.r2.dev https://*.r2.cloudflarestorage.com; frame-src 'self' https://*.facebook.com; frame-ancestors 'self';">
  <title>MVMT Printer - Ready to Print?</title>
</head>

  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
